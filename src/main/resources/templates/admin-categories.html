<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chuyên mục - NEWS PANEL</title>
    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0ea5e9;
            --sidebar-bg: #0f172a;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; color: var(--text-main); }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); min-height: 100vh; color: white; position: fixed; display: flex; flex-direction: column; }
        .logo { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1e293b; }
        .logo h2 { margin: 0; color: var(--primary); font-size: 20px; letter-spacing: 1px; font-weight: 800; }
        
        .menu { flex: 1; padding: 10px 0; }
        .menu-label { padding: 20px 25px 10px; font-size: 11px; text-transform: uppercase; color: #475569; font-weight: 700; letter-spacing: 1px; }
        .menu a { padding: 12px 25px; display: flex; align-items: center; gap: 12px; color: #94a3b8; text-decoration: none; transition: 0.3s; border-left: 4px solid transparent; font-size: 14px; }
        .menu a:hover, .menu a.active { background: #1e293b; color: var(--primary); border-left-color: var(--primary); }
        .badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: auto; }

        .logout-box { padding: 20px; border-top: 1px solid #1e293b; }
        .btn-logout { color: #fb7185; text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .btn-logout:hover { color: #f43f5e; }

        /* MAIN CONTENT */
        .main-content { margin-left: 260px; flex: 1; padding: 0 40px 40px; }
        
        /* TOPBAR CÓ ẢNH ADMIN */
        .topbar { 
            background: var(--white); 
            margin: 0 -40px 30px; 
            padding: 15px 40px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .breadcrumb { font-size: 13px; color: var(--text-muted); }
        .breadcrumb span { color: var(--primary); font-weight: 600; }

        .admin-profile { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; padding: 5px 10px; border-radius: 12px; transition: 0.3s; }
        .admin-profile:hover { background: #f1f5f9; }
        .admin-info { text-align: right; }
        .admin-info .name { display: block; font-weight: 700; font-size: 14px; color: var(--text-main); }
        .admin-info .role { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .admin-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #e0f2fe; object-fit: cover; }

        /* HEADER TITLE SECTION */
        .header-title-row { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .btn-back { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 12px; background: white; border: 1px solid var(--border); transition: 0.2s; }
        .btn-back:hover { background: #f1f5f9; color: var(--text-main); }
        .header-title-row h1 { margin: 0; font-size: 26px; font-weight: 800; }

        /* CONTENT CARD */
        .card { background: var(--white); border-radius: 24px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        /* FORM ADD */
        .add-box { background: #f8fafc; padding: 25px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 30px; }
        .form-group { display: flex; gap: 15px; }
        .form-group input { flex: 1; padding: 12px 20px; border: 1px solid var(--border); border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: #0284c7; transform: translateY(-1px); }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 20px; color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid #f1f5f9; letter-spacing: 0.5px; }
        td { padding: 20px; border-bottom: 1px solid #f1f5f9; }
        .id-cell { font-weight: 700; color: var(--primary); font-family: monospace; font-size: 15px; }
        .name-cell { font-weight: 700; font-size: 15px; color: var(--text-main); }
        
        .btn-delete { color: #ef4444; background: #fee2e2; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: 0.2s; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
        .btn-delete:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <h2><i class="fa-solid fa-newspaper"></i> NEWS PANEL</h2>
        </div>
        <nav class="menu">
            <div class="menu-label">CHÍNH</div>
            <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            
            <div class="menu-label">NỘI DUNG</div>
            <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-file-lines"></i> Bài viết </span></a>
            <a th:href="@{/admin/categories}" class="active"><i class="fa-solid fa-folder-tree"></i> Chuyên mục <span class="badge" style="background: #a855f7;">4</span></a>
            <a th:href="@{/admin/comments}"><i class="fa-solid fa-comment-dots"></i> Bình luận</a>
            
            <div class="menu-label">HỆ THỐNG</div>
            <a th:href="@{/admin/users}"><i class="fa-solid fa-user-group"></i> Người dùng</a>
            <a th:href="@{/admin/settings}"><i class="fa-solid fa-gear"></i> Cài đặt</a>
        </nav>
        <div class="logout-box">
            <a th:href="@{/logout}" class="btn-logout"><i class="fa-solid fa-power-off"></i> Đăng xuất</a>
        </div>
    </aside>

    <main class="main-content">
        <!-- TOPBAR MỚI CÓ ẢNH ADMIN -->
        <header class="topbar">
            <div class="breadcrumb">Admin / <span>Chuyên mục</span></div>
            
            <a th:href="@{/admin/settings}" class="admin-profile">
                <div class="admin-info">
                    <span class="name" th:text="${session.username}">Quản trị viên</span>
                    <span class="role">ADMINISTRATOR</span>
                </div>
                <!-- Ảnh đại diện tự động hoặc từ session -->
                <img th:src="'https://ui-avatars.com/api/?name=' + ${session.username} + '&background=0ea5e9&color=fff'" alt="Admin Avatar">
            </a>
        </header>

        <div class="header-title-row">
            <a th:href="@{/admin/dashboard}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <h1>Quản lý chuyên mục</h1>
        </div>

        <div class="card">
            <div class="add-box">
                <form th:action="@{/admin/categories/save}" method="post" class="form-group">
                    <input type="text" name="name" placeholder="Tên chuyên mục mới (ví dụ: Cristiano Ronaldo, Paulo Dybala...)" required>
                    <button type="submit" class="btn-add">
                        <i class="fa-solid fa-plus"></i> Thêm mới
                    </button>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="15%">ID</th>
                        <th width="65%">Tên chuyên mục</th>
                        <th width="20%" style="text-align: right;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td><span class="id-cell" th:text="${'#' + cat.id}">#4</span></td>
                        <td><span class="name-cell" th:text="${cat.name}">Cristiano Ronaldo</span></td>
                        <td style="text-align: right;">
                            <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" 
                               class="btn-delete" 
                               onclick="return confirm('Xóa chuyên mục này?')">
                                <i class="fa-solid fa-trash-can"></i> Xóa
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
